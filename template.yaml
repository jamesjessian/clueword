AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Clueword — word-guessing game powered by semantic similarity

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 256

Resources:
  # ── API ──────────────────────────────────────────────────────

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  CluewordApi:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: api/
      Description: Clueword puzzle API
      Events:
        PuzzleDaily:
          Type: HttpApi
          Properties:
            Path: /api/puzzle/daily
            Method: get
            ApiId: !Ref HttpApi
        PuzzleRandom:
          Type: HttpApi
          Properties:
            Path: /api/puzzle/random
            Method: get
            ApiId: !Ref HttpApi
        PuzzleCheck:
          Type: HttpApi
          Properties:
            Path: /api/puzzle/check
            Method: post
            ApiId: !Ref HttpApi
        Health:
          Type: HttpApi
          Properties:
            Path: /api/health
            Method: get
            ApiId: !Ref HttpApi

  # ── Frontend (S3 + CloudFront) ───────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-s3-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub 'Clueword (${AWS::StackName})'
        HttpVersion: http2and3
        PriceClass: PriceClass_100

        Origins:
          # Static frontend from S3
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''

          # API from API Gateway
          - Id: ApiOrigin
            DomainName: !Sub '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true

        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  CloudFrontUrl:
    Description: Game URL (CloudFront)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  FrontendBucketName:
    Description: S3 bucket for frontend files
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution
